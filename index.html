<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>💞 Chat & Call Pasangan</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    :root {
      --pink-400: #ec407a;
      --pink-500: #e91e63;
      --pink-600: #d81b60;
      --pink-700: #c2185b;
      --pink-800: #ad1457;
      --red-500: #f44336;
      --green-500: #4caf50;
      --gray-50: #fafafa;
      --gray-100: #f5f5f5;
      --gray-200: #eeeeee;
      --gray-700: #616161;
      --gray-900: #212121;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
    }
    body {
      background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      height: 100dvh;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(25px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(0,0,0,0.1);
    }
    @media (min-width: 501px) {
      .app {
        height: 92vh;
        height: 92dvh;
        max-height: 850px;
        border-radius: 32px;
        border: 1px solid rgba(255,255,255,0.6);
      }
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      min-height: 56px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--pink-500);
      font-weight: bold;
      flex-shrink: 0;
    }
    .header-info {
      min-width: 0;
    }
    .header-info h3 {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-info span {
      font-size: 0.7rem;
      opacity: 0.9;
    }
    .header-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:active {
      background: rgba(255,255,255,0.45);
      transform: scale(0.93);
    }
    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--gray-50);
      overflow: hidden;
      position: relative;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.sent {
      align-self: flex-end;
      background: var(--pink-400);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.received {
      align-self: flex-start;
      background: white;
      color: var(--gray-900);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .msg .time {
      font-size: 0.6rem;
      opacity: 0.7;
      margin-top: 3px;
      text-align: right;
    }
    .msg img {
      max-width: 180px;
      border-radius: 10px;
      cursor: pointer;
      display: block;
      margin-bottom: 3px;
    }
    .msg .voice-note audio {
      height: 32px;
      width: 100%;
      min-width: 130px;
    }
    .system-msg {
      align-self: center;
      background: var(--gray-200);
      color: var(--gray-700);
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 14px;
      font-style: italic;
    }
    /* Input */
    .input-area {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: white;
      border-top: 1px solid var(--gray-200);
      flex-shrink: 0;
      min-height: 52px;
    }
    .input-area input[type="text"] {
      flex: 1;
      border: none;
      background: var(--gray-100);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.9rem;
      outline: none;
      min-width: 0;
    }
    .attach-btn, .voice-btn, .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .attach-btn { background: var(--gray-200); color: var(--gray-700); }
    .voice-btn { background: #fce4ec; color: var(--pink-600); }
    .send-btn { background: var(--pink-400); color: white; }
    .voice-btn.recording {
      background: var(--red-500);
      color: white;
      animation: pulse 0.7s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }
    /* Call Overlay */
    .call-overlay {
      position: absolute;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .call-overlay.hidden { display: none; }
    .call-avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: white;
      margin-bottom: 16px;
    }
    .call-video-full {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    .call-local-pip {
      position: absolute;
      bottom: 100px;
      right: 16px;
      width: 100px;
      height: 140px;
      border-radius: 12px;
      border: 2px solid white;
      object-fit: cover;
      z-index: 10;
      background: #333;
    }
    .call-info {
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 1rem;
      z-index: 5;
    }
    .call-controls {
      display: flex;
      gap: 20px;
      padding: 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      z-index: 5;
      margin-bottom: 30px;
    }
    .call-controls button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .call-controls button.end-call {
      background: var(--red-500);
      width: 60px;
      height: 60px;
    }
    /* Auth */
    .auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 14px;
      height: 100%;
    }
    .auth-screen h2 { color: var(--pink-700); font-size: 1.5rem; }
    .auth-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 24px;
      border: 2px solid #f8bbd0;
      background: white;
      font-size: 0.9rem;
      outline: none;
    }
    .auth-screen input:focus { border-color: var(--pink-400); }
    .auth-btn {
      width: 100%;
      padding: 12px;
      border-radius: 24px;
      border: none;
      background: var(--pink-400);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-btn.secondary {
      background: white;
      color: var(--pink-600);
      border: 2px solid #f8bbd0;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Auth -->
  <div class="auth-screen" id="authScreen">
    <div style="font-size:3rem;">💞</div>
    <h2>Chat & Call Pasangan</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">
    <button class="auth-btn" id="loginBtn">💌 Masuk</button>
    <button class="auth-btn secondary" id="signupBtn">✨ Daftar</button>
    <p style="font-size:0.7rem;color:gray;">Gunakan email berbeda</p>
  </div>

  <!-- Main UI -->
  <div class="hidden" id="mainUI">
    <div class="header">
      <div class="header-left">
        <div class="avatar">❤️</div>
        <div class="header-info">
          <h3 id="partnerName">Pasangan</h3>
          <span id="partnerStatus">⚪ offline</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="voiceCallBtn">📞</button>
        <button class="icon-btn" id="videoCallBtn">📹</button>
        <button class="icon-btn" id="logoutBtn">🚪</button>
      </div>
    </div>
    <div class="content">
      <div class="messages" id="messagesContainer"></div>
    </div>
    <div class="input-area">
      <input type="file" id="imageInput" accept="image/*" style="display:none;">
      <button class="attach-btn" id="attachBtn">📎</button>
      <input type="text" id="messageInput" placeholder="Ketik pesan...">
      <button class="voice-btn" id="voiceNoteBtn">🎤</button>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>

  <!-- Call Overlay -->
  <div class="call-overlay hidden" id="callOverlay">
    <div class="call-avatar-large hidden" id="callAvatar">❤️</div>
    <video class="call-video-full hidden" id="remoteVideo" autoplay playsinline></video>
    <video class="call-local-pip hidden" id="localVideo" autoplay muted playsinline></video>
    <div class="call-info" id="callStatus">Menghubungkan...</div>
    <div class="call-controls">
      <button id="toggleMicBtn">🎤</button>
      <button class="end-call" id="endCallBtn">🔴</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ==================== KONFIGURASI ====================
  const SUPABASE_URL = 'https://zxvmlhjmbtiunccshjty.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dm1saGptYnRpdW5jY3NoanR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMDQwNjUsImV4cCI6MjA5NjU4MDA2NX0.bzFwImSQKmg6beWPas0YS3VoVIIQ_tfW_1PsxuH7jBA';
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // State
  let currentUser = null;
  let partnerUser = null;
  const roomId = 'room-pasangan-utama';
  let peer = null;
  let localStream = null;
  let currentCall = null;
  let isCallActive = false;
  let isVideoCall = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let realtimeChannel = null;
  let callSignalChannel = null;

  // DOM
  const $ = (id) => document.getElementById(id);
  const authScreen = $('authScreen');
  const mainUI = $('mainUI');
  const messagesContainer = $('messagesContainer');
  const messageInput = $('messageInput');
  const callOverlay = $('callOverlay');
  const callAvatar = $('callAvatar');
  const remoteVideo = $('remoteVideo');
  const localVideo = $('localVideo');
  const callStatus = $('callStatus');
  const partnerNameEl = $('partnerName');
  const partnerStatusEl = $('partnerStatus');

  // Helper
  function scrollToBottom() {
    setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 50);
  }

  function formatTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg system-msg';
    div.textContent = text;
    messagesContainer.appendChild(div);
    scrollToBottom();
  }

  function addMessage(type, data, senderId) {
    if (type === 'call_signal') return;
    const isSent = senderId === currentUser?.id;
    const div = document.createElement('div');
    div.className = `msg ${isSent ? 'sent' : 'received'}`;

    if (type === 'text') {
      div.textContent = data.text;
    } else if (type === 'image') {
      const img = document.createElement('img');
      img.src = data.url;
      img.onclick = () => window.open(data.url, '_blank');
      div.appendChild(img);
    } else if (type === 'voice') {
      div.innerHTML = `<audio controls src="${data.url}" style="height:32px;width:100%;min-width:130px;"></audio>`;
    }

    const timeSpan = document.createElement('div');
    timeSpan.className = 'time';
    timeSpan.textContent = formatTime();
    div.appendChild(timeSpan);
    messagesContainer.appendChild(div);
    scrollToBottom();
  }

  // ==================== AUTH ====================
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
      currentUser = session.user;
      showMainUI();
      await initRealtime();
    } else {
      showAuth();
    }
  }

  function showAuth() {
    authScreen.classList.remove('hidden');
    mainUI.classList.add('hidden');
  }

  function showMainUI() {
    authScreen.classList.add('hidden');
    mainUI.classList.remove('hidden');
  }

  $('loginBtn').addEventListener('click', async () => {
    const email = $('emailInput').value.trim();
    const password = $('passwordInput').value;
    if (!email || !password) return alert('Isi email dan password');
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return alert('Gagal masuk: ' + error.message);
    currentUser = data.user;
    showMainUI();
    await initRealtime();
  });

  $('signupBtn').addEventListener('click', async () => {
    const email = $('emailInput').value.trim();
    const password = $('passwordInput').value;
    if (!email || !password) return alert('Isi email dan password');
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) return alert('Gagal daftar: ' + error.message);
    alert('Berhasil daftar! Silakan masuk.');
  });

  $('logoutBtn').addEventListener('click', async () => {
    await cleanupAll();
    await supabase.auth.signOut();
    currentUser = null;
    showAuth();
  });

  // ==================== REALTIME ====================
  async function initRealtime() {
    if (realtimeChannel) await supabase.removeChannel(realtimeChannel);
    if (callSignalChannel) await supabase.removeChannel(callSignalChannel);

    // Channel untuk chat
    realtimeChannel = supabase
      .channel('chat')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `room_id=eq.${roomId}`
      }, (payload) => {
        const msg = payload.new;
        if (msg.user_id === currentUser?.id) return;

        // Update partner info
        if (!partnerUser || partnerUser.id !== msg.user_id) {
          partnerUser = { id: msg.user_id, email: msg.sender_email };
          partnerNameEl.textContent = msg.sender_email?.split('@')[0] || 'Pasangan';
          partnerStatusEl.textContent = '🟢 online';
        }

        let contentData;
        try { contentData = JSON.parse(msg.content); } catch (e) { contentData = { text: msg.content }; }

        if (msg.type === 'call_signal') {
          handleCallSignal(contentData);
          return;
        }

        addMessage(msg.type, contentData, msg.user_id);
      })
      .subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
          console.log('✅ Chat realtime OK');
          partnerStatusEl.textContent = '🟢 online';
          await loadOldMessages();
        }
      });
  }

  async function loadOldMessages() {
    const { data } = await supabase
      .from('messages')
      .select('*')
      .eq('room_id', roomId)
      .neq('type', 'call_signal')
      .order('created_at', { ascending: true })
      .limit(50);

    if (data) {
      messagesContainer.innerHTML = '';
      data.forEach(msg => {
        if (msg.user_id !== currentUser?.id) {
          let d;
          try { d = JSON.parse(msg.content); } catch (e) { d = { text: msg.content }; }
          addMessage(msg.type, d, msg.user_id);
          if (!partnerUser) {
            partnerUser = { id: msg.user_id, email: msg.sender_email };
            partnerNameEl.textContent = msg.sender_email?.split('@')[0] || 'Pasangan';
          }
        }
      });
    }
  }

  // ==================== KIRIM PESAN ====================
  async function sendMessage(type, contentData) {
    if (!currentUser) return;
    const { error } = await supabase.from('messages').insert({
      room_id: roomId,
      user_id: currentUser.id,
      sender_email: currentUser.email,
      type: type,
      content: JSON.stringify(contentData),
      created_at: new Date().toISOString()
    });
    if (error) {
      alert('Gagal kirim: ' + error.message);
    } else {
      addMessage(type, contentData, currentUser.id);
    }
  }

  $('sendBtn').addEventListener('click', () => {
    const text = messageInput.value.trim();
    if (!text) return;
    sendMessage('text', { text });
    messageInput.value = '';
  });

  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') $('sendBtn').click();
  });

  $('attachBtn').addEventListener('click', () => $('imageInput').click());

  $('imageInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fileName = `${Date.now()}-${file.name}`;
    const { error } = await supabase.storage.from('chat-media').upload(`images/${fileName}`, file);
    if (error) return alert('Upload gagal');
    const { data: urlData } = supabase.storage.from('chat-media').getPublicUrl(`images/${fileName}`);
    sendMessage('image', { url: urlData.publicUrl });
    $('imageInput').value = '';
  });

  // Voice note
  $('voiceNoteBtn').addEventListener('mousedown', startRecording);
  $('voiceNoteBtn').addEventListener('mouseup', stopRecording);
  $('voiceNoteBtn').addEventListener('mouseleave', stopRecording);
  $('voiceNoteBtn').addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
  $('voiceNoteBtn').addEventListener('touchend', stopRecording);

  async function startRecording() {
    if (isRecording) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const fileName = `voice-${Date.now()}.webm`;
        const { error } = await supabase.storage.from('chat-media').upload(`voice/${fileName}`, blob);
        if (!error) {
          const { data: urlData } = supabase.storage.from('chat-media').getPublicUrl(`voice/${fileName}`);
          sendMessage('voice', { url: urlData.publicUrl });
        }
      };
      mediaRecorder.start();
      isRecording = true;
      $('voiceNoteBtn').classList.add('recording');
      $('voiceNoteBtn').textContent = '🔴';
    } catch (err) {
      alert('Mikrofon tidak bisa diakses');
    }
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    mediaRecorder.stop();
    isRecording = false;
    $('voiceNoteBtn').classList.remove('recording');
    $('voiceNoteBtn').textContent = '🎤';
  }

  // ==================== CALL ====================
  function handleCallSignal(data) {
    if (data.signal_type === 'incoming_call') {
      isVideoCall = data.video;
      if (isCallActive) {
        sendCallSignal('busy', {});
        return;
      }
      answerCall(data.peerId);
    } else if (data.signal_type === 'call_ended') {
      hideCallUI();
    } else if (data.signal_type === 'busy') {
      alert('Pasangan sedang dalam panggilan');
      hideCallUI();
    }
  }

  async function startCall(video = true) {
    if (isCallActive) return;
    isVideoCall = video;

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: video,
        audio: true
      });
    } catch (e) {
      alert('Tidak bisa akses kamera/mikrofon');
      return;
    }

    const peerId = `call-${currentUser.id.substring(0, 8)}-${Date.now().toString(36)}`;
    if (peer) peer.destroy();
    peer = new Peer(peerId);

    peer.on('open', (id) => {
      showCallUI(true);
      sendCallSignal('incoming_call', { video, peerId: id });
    });

    peer.on('call', (incomingCall) => {
      currentCall = incomingCall;
      incomingCall.answer(localStream);
      setupCallStream(incomingCall);
    });

    peer.on('error', (err) => {
      console.error('Peer error:', err);
      hideCallUI();
    });
  }

  async function answerCall(remotePeerId) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: isVideoCall,
        audio: true
      });
    } catch (e) {
      alert('Tidak bisa akses kamera/mikrofon');
      return;
    }

    const peerId = `call-${currentUser.id.substring(0, 8)}-${Date.now().toString(36)}`;
    if (peer) peer.destroy();
    peer = new Peer(peerId);

    peer.on('open', () => {
      showCallUI(false);
      const call = peer.call(remotePeerId, localStream);
      currentCall = call;
      setupCallStream(call);
    });

    peer.on('error', (err) => {
      console.error('Peer error:', err);
      hideCallUI();
    });
  }

  function setupCallStream(call) {
    call.on('stream', (remoteStream) => {
      if (isVideoCall) {
        remoteVideo.srcObject = remoteStream;
        remoteVideo.classList.remove('hidden');
        callAvatar.classList.add('hidden');
      } else {
        // Voice call: tampilkan avatar saja
        const audioTrack = remoteStream.getAudioTracks()[0];
        if (audioTrack) {
          const audioEl = new Audio();
          audioEl.srcObject = new MediaStream([audioTrack]);
          audioEl.play().catch(() => {});
        }
        callAvatar.classList.remove('hidden');
        remoteVideo.classList.add('hidden');
      }
      callStatus.textContent = '💞 Terhubung';
    });
    call.on('close', hideCallUI);
    call.on('error', hideCallUI);
  }

  function showCallUI(isCaller) {
    callOverlay.classList.remove('hidden');
    isCallActive = true;

    if (isVideoCall) {
      localVideo.srcObject = localStream;
      localVideo.classList.remove('hidden');
      callAvatar.classList.add('hidden');
    } else {
      localVideo.classList.add('hidden');
      callAvatar.classList.remove('hidden');
      callAvatar.textContent = '❤️';
    }

    callStatus.textContent = isCaller ? '📞 Memanggil...' : '📲 Menerima panggilan...';
  }

  function hideCallUI() {
    callOverlay.classList.add('hidden');
    isCallActive = false;

    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }

    localVideo.srcObject = null;
    remoteVideo.srcObject = null;
    localVideo.classList.add('hidden');
    remoteVideo.classList.add('hidden');
    callAvatar.classList.add('hidden');

    if (currentCall) {
      currentCall.close();
      currentCall = null;
    }
    if (peer) {
      peer.destroy();
      peer = null;
    }
  }

  function sendCallSignal(type, data) {
    if (!currentUser) return;
    supabase.from('messages').insert({
      room_id: roomId,
      user_id: currentUser.id,
      sender_email: currentUser.email,
      type: 'call_signal',
      content: JSON.stringify({ signal_type: type, ...data }),
      created_at: new Date().toISOString()
    }).then(({ error }) => {
      if (error) console.error('Signal error:', error);
    });
  }

  // ==================== BUTTON CALL ====================
  $('voiceCallBtn').addEventListener('click', () => startCall(false));
  $('videoCallBtn').addEventListener('click', () => startCall(true));
  $('endCallBtn').addEventListener('click', () => {
    sendCallSignal('call_ended', {});
    hideCallUI();
  });

  $('toggleMicBtn').addEventListener('click', () => {
    if (localStream) {
      const audio = localStream.getAudioTracks()[0];
      if (audio) {
        audio.enabled = !audio.enabled;
        $('toggleMicBtn').textContent = audio.enabled ? '🎤' : '🔇';
      }
    }
  });

  // ==================== CLEANUP ====================
  async function cleanupAll() {
    hideCallUI();
    if (realtimeChannel) {
      await supabase.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
    messagesContainer.innerHTML = '';
    partnerUser = null;
    partnerNameEl.textContent = 'Pasangan';
    partnerStatusEl.textContent = '⚪ offline';
  }

  // ==================== INIT ====================
  checkSession();
})();
</script>
</body>
</html>
